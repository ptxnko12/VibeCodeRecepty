
<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookAI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<header class="navbar glass">
  <h1>CookAI</h1>
  <div class="controls">
    <select id="difficultyFilter">
      <option value="all">Všetky obtiažnosti</option>
      <option value="Ľahká">Ľahká</option>
      <option value="Stredná">Stredná</option>
      <option value="Náročná">Náročná</option>
    </select>
    <button id="themeToggle">🌙 Dark mode</button>
  </div>
</header>

<section class="hero">
  <div class="glass hero-box">
    <h2>Čo máte v chladničke?</h2>
    <p>Pridaj ingrediencie oddelené čiarkou.</p>

    <div class="input-group">
      <input type="text" id="ingredientInput" placeholder="vajcia, syr, paradajky...">
      <button id="addBtn">Pridať</button>
    </div>

    <div id="tags"></div>

    <div class="actions">
      <button id="findBtn" class="primary">Nájdi recepty</button>
      <button id="randomBtn" class="secondary">Náhodný recept</button>
    </div>
  </div>
</section>

<section class="recipes-section">
  <h2>Vybrané recepty</h2>
  <div id="recipes" class="recipes-grid"></div>
</section>

<div id="modal" class="modal hidden">
  <div class="modal-content glass">
    <span id="closeModal">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
